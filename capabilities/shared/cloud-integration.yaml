naftiko: "1.0.0-alpha1"

info:
  label: TIBCO Cloud Integration API
  description: >-
    TIBCO Cloud Integration (TCI) API enables management of Flogo and Business
    Studio integration applications, connections, environments, and deployments
    on the TIBCO cloud integration platform.
  tags:
    - TIBCO
    - Cloud Integration
    - Flogo
    - Integration
    - iPaaS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TIBCO_CLOUD_TOKEN: TIBCO_CLOUD_TOKEN

capability:
  consumes:
    - type: http
      namespace: tibco-tci
      baseUri: https://integration.cloud.tibco.com/api/v1
      description: TIBCO Cloud Integration REST API
      authentication:
        type: bearer
        token: "{{TIBCO_CLOUD_TOKEN}}"
      resources:
        - name: apps
          path: /apps
          description: Integration application management
          operations:
            - name: list-apps
              method: GET
              description: List all integration applications
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
                - name: filter
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-app
              method: POST
              description: Create a new integration application
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  type: "{{tools.type}}"

            - name: get-app
              method: GET
              description: Get integration application details
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-app
              method: DELETE
              description: Delete an integration application
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: connections
          path: /connections
          description: Connector connection management
          operations:
            - name: list-connections
              method: GET
              description: List all connections
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-connection
              method: POST
              description: Create a new connection
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  connectorType: "{{tools.connectorType}}"
                  properties: "{{tools.properties}}"

        - name: deployments
          path: /deployments
          description: App deployment management
          operations:
            - name: list-deployments
              method: GET
              description: List all deployments
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: deploy-app
              method: POST
              description: Deploy an integration application
              inputParameters:
                - name: appId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  instances: "{{tools.instances}}"
                  environmentId: "{{tools.environmentId}}"

  exposes:
    - type: rest
      port: 8100
      namespace: tibco-tci-rest
      resources:
        - path: /v1/apps
          name: apps
          description: Integration apps
          operations:
            - method: GET
              name: list-apps
              description: List all integration apps
              call: "tibco-tci.list-apps"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tibco-tci-mcp
      transport: http
      tools:
        - name: list-apps
          description: List TIBCO Cloud Integration applications
          hints:
            readOnly: true
            openWorld: false
          call: "tibco-tci.list-apps"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-app
          description: Get details for a specific integration app
          hints:
            readOnly: true
            openWorld: false
          call: "tibco-tci.get-app"
          with:
            appId: "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-connections
          description: List TIBCO Cloud Integration connections
          hints:
            readOnly: true
            openWorld: false
          call: "tibco-tci.list-connections"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-deployments
          description: List TIBCO Cloud Integration deployments
          hints:
            readOnly: true
            openWorld: false
          call: "tibco-tci.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."
